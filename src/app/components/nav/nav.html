<nav class="nav">
  <!-- Left: logo -->
  <a class="nav-logo" routerLink="/">
    <span class="nav-logo-icon">🪐</span>
    <span class="nav-logo-text">planit</span>
  </a>

  <!-- Center: location pill -->
  <div class="nav-center">
    <a class="nav-location-pill" routerLink="/dashboard">events dashboard</a>
  </div>

  <!-- Right: user area -->
  <div class="nav-right">
    @if (session$ | async; as session) {
      <span class="nav-ready">ready to plan, <span class="nav-username">{{ (session.user.email ?? '').split('@')[0] }}</span>?</span>
      <button class="nav-avatar" (click)="signOut()" title="Sign out">
        {{ getInitials(session.user.email ?? '') }}
      </button>
    } @else {
      <a class="nav-link" routerLink="/login">Log in</a>
      <a class="btn-primary" routerLink="/signup">Sign up</a>
    }
  </div>
</nav>
